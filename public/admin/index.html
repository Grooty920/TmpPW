<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>后台管理 · 小杨王子</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap");
@import url("https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap");
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Serif SC","LXGW WenKai",serif;background:#f7f3e8;color:#1c1c1c;min-height:100vh;transition:background 0.3s}
::selection{background:#c73e3a;color:#f7f3e8}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c73e3a;border-radius:2px}
.card{background:rgba(254,252,245,0.6);backdrop-filter:blur(12px) saturate(1.1);-webkit-backdrop-filter:blur(12px) saturate(1.1);border:1px solid rgba(212,196,148,0.3);padding:20px;box-shadow:0 1px 3px rgba(28,28,18,0.06),0 1px 2px rgba(0,0,0,0.02),inset 0 1px 0 rgba(255,255,255,0.15);border-radius:8px;transition:all 0.3s ease}
.card:hover{border-color:#c73e3a;box-shadow:0 8px 32px rgba(28,28,18,0.06),0 2px 8px rgba(0,0,0,0.04)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;font-size:13px;font-family:inherit;cursor:pointer;letter-spacing:0.05em;transition:all 0.3s ease;position:relative;overflow:hidden;border-radius:4px;font-weight:500}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(199,62,58,0.15)}
.btn-primary{background:#c73e3a;color:#f7f3e8;border:1px solid #c73e3a}
.btn-primary:hover{box-shadow:0 4px 24px rgba(199,62,58,0.2)}
.btn-ok{background:#4a6741;color:#f7f3e8;border:1px solid #4a6741}
.btn-outline{background:rgba(254,252,245,0.6);backdrop-filter:blur(8px);border:1px solid rgba(212,196,148,0.3);color:#1c1c1c}
.btn-outline:hover{border-color:#c73e3a;color:#c73e3a}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px}
input,textarea,select{width:100%;padding:8px 12px;border:1px solid rgba(212,196,148,0.3);background:rgba(254,252,245,0.4);font-size:13px;font-family:inherit;outline:none;transition:border-color 0.3s ease,box-shadow 0.3s ease;border-radius:4px;color:#1c1c1c}
input:focus,textarea:focus,select:focus{border-color:#c73e3a;box-shadow:0 0 0 2px rgba(199,62,58,0.1)}
textarea{resize:vertical;min-height:80px}
label{display:block;font-size:12px;color:#6b5f45;margin-bottom:4px;letter-spacing:0.05em}
.hidden{display:none!important}
.flex{display:flex;gap:8px}
.flex-1{flex:1}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.flex-wrap{flex-wrap:wrap}
.mb-2{margin-bottom:8px}
.mb-3{margin-bottom:12px}
.mb-4{margin-bottom:16px}
.mt-2{margin-top:8px}
.mt-3{margin-top:12px}
.text-sm{font-size:13px}
.text-xs{font-size:12px}
.text-muted{color:#6b5f45}
.text-accent{color:#c73e3a}
.w-full{width:100%}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.msg{padding:10px 16px;font-size:13px;margin-bottom:12px;border-radius:4px;border:1px solid}
.msg-ok{background:#e8f0e4;color:#4a6741;border-color:#4a6741}
.msg-err{background:#f5e4e4;color:#c73e3a;border-color:#c73e3a}
.upload-zone{border:2px dashed rgba(212,196,148,0.5);padding:30px;text-align:center;cursor:pointer;transition:all 0.3s;background:rgba(247,243,232,0.3);border-radius:8px}
.upload-zone:hover,.upload-zone.dragover{border-color:#c73e3a;background:rgba(254,252,245,0.6)}
.upload-zone p{font-size:13px;color:#6b5f45}
.upload-zone .icon{font-size:32px;margin-bottom:8px}
.drag-item{cursor:grab;transition:all 0.15s;user-select:none}
.drag-item:hover{border-color:#c73e3a!important}
.drag-item.dragging{opacity:0.4;border-color:#c73e3a!important}
.drag-item.drag-over{border-color:#c73e3a!important;border-style:dashed!important;background:#f5e4e4!important}
.drag-handle{cursor:grab;font-size:16px;color:rgba(212,196,148,0.5);margin-right:8px;flex-shrink:0}
.drag-handle:hover{color:#c73e3a}
.tab-btn{border-radius:4px;transition:all 0.3s ease}
.tab-btn:hover{transform:translateY(-1px)}
h1{font-family:"Ma Shan Zheng","Noto Serif SC",cursive;letter-spacing:0.1em}
h3{font-family:"Ma Shan Zheng","Noto Serif SC",cursive;letter-spacing:0.05em}
/* 侧边栏布局 */
.admin-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; background: rgba(254,252,245,0.8);
  backdrop-filter: blur(12px); border-bottom: 1px solid rgba(212,196,148,0.2);
  position: sticky; top: 0; z-index: 100;
}
.admin-header-left { display: flex; align-items: center; gap: 12px; }
.admin-title { font-family: 'Ma Shan Zheng','Noto Serif SC',cursive; font-size: 18px; color: #1c1c1c; letter-spacing: 0.1em; }
.admin-header-right { display: flex; align-items: center; gap: 12px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #d4c494; display: inline-block; }
.status-text { font-size: 12px; color: #6b5f45; }
.admin-version { font-size: 10px; color: #d4c494; background: rgba(212,196,148,0.15); padding: 2px 8px; border-radius: 3px; }

.admin-body { display: flex; gap: 0; min-height: calc(100vh - 56px); }

.sidebar {
  width: 200px; flex-shrink: 0;
  background: rgba(254,252,245,0.4);
  border-right: 1px solid rgba(212,196,148,0.15);
  padding: 12px 0;
  display: flex; flex-direction: column;
  justify-content: space-between;
  position: sticky; top: 56px; height: calc(100vh - 56px);
  overflow-y: auto;
  transition: transform 0.3s ease, width 0.3s ease;
}
.sidebar-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 8px; }
.sidebar-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border: none; background: transparent;
  font-size: 13px; font-family: inherit; color: #6b5f45;
  cursor: pointer; border-radius: 6px;
  transition: all 0.2s ease; text-align: left; width: 100%;
}
.sidebar-btn:hover { background: rgba(199,62,58,0.06); color: #1c1c1c; }
.sidebar-btn.active { background: rgba(199,62,58,0.1); color: #c73e3a; font-weight: 500; }
.sidebar-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
.sidebar-footer { padding: 8px; border-top: 1px solid rgba(212,196,148,0.15); margin-top: 8px; }

.admin-content {
  flex: 1; padding: 24px; overflow-y: auto;
  min-height: calc(100vh - 56px);
}

/* 响应式 - 移动端侧边栏折叠 */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: 0; top: 56px; z-index: 99; transform: translateX(-100%); width: 240px; box-shadow: 4px 0 20px rgba(0,0,0,0.1); }
  .sidebar.open { transform: translateX(0); }
  .admin-content { padding: 16px; }
  #sidebar-toggle { display: flex !important; }
}
#sidebar-toggle { display: none; }

/* 仪表盘卡片 */
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { padding: 20px; text-align: center; }
.stat-card .stat-number { font-size: 28px; font-weight: 600; color: #c73e3a; font-family: 'Ma Shan Zheng',cursive; }
.stat-card .stat-label { font-size: 12px; color: #6b5f45; margin-top: 4px; }
.stat-card .stat-icon { font-size: 24px; margin-bottom: 8px; }

/* 文章卡片列表 */
.post-card { padding: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; }
.post-card:hover { border-color: #c73e3a; }
.post-card-info { flex: 1; min-width: 200px; }
.post-card-title { font-size: 14px; font-weight: 500; color: #1c1c1c; }
.post-card-meta { font-size: 11px; color: #6b5f45; margin-top: 4px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.post-card-desc { font-size: 11px; color: #6b5f45; margin-top: 2px; opacity: 0.7; }
.post-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
.post-cat-tag { background: rgba(199,62,58,0.08); padding: 1px 6px; border-radius: 2px; font-size: 10px; color: #c73e3a; }
.post-date-tag { color: #4a6741; }

/* 搜索栏 */
.search-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.search-bar input { flex: 1; min-width: 150px; }
.search-bar select { width: auto; min-width: 100px; }

/* 文章编辑器双栏 */
.editor-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; min-height: 500px; }
.editor-pane { display: flex; flex-direction: column; }
.editor-pane textarea { flex: 1; min-height: 400px; font-family: 'LXGW WenKai', monospace; font-size: 13px; line-height: 1.8; padding: 16px; border: 1px solid rgba(212,196,148,0.3); background: rgba(254,252,245,0.4); border-radius: 8px; resize: vertical; }
.preview-pane { padding: 16px; border: 1px solid rgba(212,196,148,0.3); background: rgba(254,252,245,0.4); border-radius: 8px; overflow-y: auto; min-height: 400px; }
.preview-pane h1 { font-size: 1.5em; }
.editor-toolbar { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
.editor-toolbar button { font-size: 12px; padding: 4px 10px; }
@media (max-width: 768px) { .editor-layout { grid-template-columns: 1fr; } }

/* 文件网格 */
.file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.file-item { text-align: center; padding: 12px; background: #f7f3e8; border: 1px solid #e8e0cc; border-radius: 6px; transition: all 0.2s; }
.file-item:hover { border-color: #c73e3a; }
.file-item img { max-width: 100%; height: 80px; object-fit: cover; margin-bottom: 6px; border-radius: 4px; }
.file-item .file-name { font-size: 10px; word-break: break-all; color: #6b5f45; }

/* 颜色选择器行 */
.color-row { display: flex; gap: 8px; align-items: center; }
.color-row input[type="text"] { flex: 1; font-family: monospace; }
.color-picker { width: 40px; height: 40px; padding: 2px; border: 1px solid #e8e0cc; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>

<div id="app">
  <!-- 登录 -->
  <div id="login-screen" class="card" style="max-width:360px;margin:40vh auto 0;text-align:center;padding:40px">
    <h1 style="font-size:20px;margin-bottom:6px;letter-spacing:0.1em">🔐 后台管理</h1>
    <p style="font-size:13px;color:#6b5f45;margin-bottom:24px">小杨王子 · 水墨博客</p>
    <input id="pwd-input" type="password" placeholder="管理密码" style="text-align:center">
    <button id="login-btn" class="btn btn-primary w-full mt-3">进入</button>
    <div id="login-err" class="msg msg-err hidden mt-2" style="display:none">密码错误</div>
  </div>

  <!-- 主界面 -->
  <div id="main-screen" class="hidden" style="max-width:960px;margin:0 auto;padding:0">
    <!-- 顶栏 -->
    <div class="admin-header">
      <div class="admin-header-left">
        <button id="sidebar-toggle" class="btn btn-outline btn-sm" onclick="toggleSidebar()">☰</button>
        <h1 class="admin-title">水墨后台</h1>
      </div>
      <div class="admin-header-right">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-text" class="status-text">未连接</span>
        <span class="admin-version">v2.0</span>
      </div>
    </div>

    <div id="token-bar" class="card" style="margin:16px">
      <div class="flex gap-3 items-center flex-wrap">
        <input id="token-input" type="password" placeholder="GitHub Personal Access Token (ghp_...)" style="flex:1;min-width:200px">
        <button id="token-btn" class="btn btn-primary">连接</button>
        <a href="https://github.com/settings/tokens" target="_blank" class="text-xs text-accent" style="text-decoration:none">生成 Token</a>
      </div>
      <div id="token-err" class="text-xs text-accent mt-2 hidden" style="display:none"></div>
    </div>

    <div id="global-msg" style="margin:0 16px"></div>

    <!-- 主体：侧边栏 + 内容区 -->
    <div class="admin-body">
      <!-- 侧边栏 -->
      <aside id="sidebar" class="sidebar">
        <nav class="sidebar-nav">
          <button class="sidebar-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">
            <span class="sidebar-icon">📊</span> 仪表盘
          </button>
          <button class="sidebar-btn" data-tab="posts" onclick="switchTab('posts')">
            <span class="sidebar-icon">📝</span> 文章
          </button>
          <button class="sidebar-btn" data-tab="editor" onclick="switchTab('editor')">
            <span class="sidebar-icon">✏️</span> 写文章
          </button>
          <button class="sidebar-btn" data-tab="tools" onclick="switchTab('tools')">
            <span class="sidebar-icon">🔧</span> 工具
          </button>
          <button class="sidebar-btn" data-tab="nav" onclick="switchTab('nav')">
            <span class="sidebar-icon">🧭</span> 导航
          </button>
          <button class="sidebar-btn" data-tab="profile" onclick="switchTab('profile')">
            <span class="sidebar-icon">👤</span> 简介
          </button>
          <button class="sidebar-btn" data-tab="upload" onclick="switchTab('upload')">
            <span class="sidebar-icon">📤</span> 上传
          </button>
          <button class="sidebar-btn" data-tab="site" onclick="switchTab('site')">
            <span class="sidebar-icon">⚙️</span> 站点
          </button>
        </nav>
        <div class="sidebar-footer">
          <a href="/" target="_blank" class="sidebar-btn" style="text-decoration:none;display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:12px;color:#6b5f45;border:none;background:none;width:100%;cursor:pointer">
            <span>🏠</span> 查看博客
          </a>
        </div>
      </aside>

      <!-- 内容区 -->
      <main class="admin-content">
        <div id="tab-dashboard" class="tab-content"></div>
        <div id="tab-posts" class="tab-content hidden"></div>
        <div id="tab-editor" class="tab-content hidden"></div>
        <div id="tab-tools" class="tab-content hidden"></div>
        <div id="tab-nav" class="tab-content hidden"></div>
        <div id="tab-profile" class="tab-content hidden"></div>
        <div id="tab-upload" class="tab-content hidden"></div>
        <div id="tab-site" class="tab-content hidden"></div>
      </main>
    </div>
  </div>

    <div id="token-bar" class="card mb-4">
      <div class="flex gap-3 items-center flex-wrap">
        <input id="token-input" type="password" placeholder="GitHub Personal Access Token (ghp_...)" style="flex:1;min-width:200px">
        <button id="token-btn" class="btn btn-primary">连接</button>
        <a href="https://github.com/settings/tokens" target="_blank" class="text-xs text-accent" style="text-decoration:none">生成 Token</a>
      </div>
      <div id="token-err" class="text-xs text-accent mt-2 hidden" style="display:none"></div>
    </div>

    <div id="global-msg" class="hidden"></div>

    <!-- 标签页 -->
    <div class="flex gap-2 mb-4 flex-wrap">
      <button class="tab-btn btn btn-primary btn-sm" data-tab="tools">🔧 工具</button>
      <button class="tab-btn btn btn-outline btn-sm" data-tab="nav">🧭 导航</button>
      <button class="tab-btn btn btn-outline btn-sm" data-tab="profile">👤 简介</button>
      <button class="tab-btn btn btn-outline btn-sm" data-tab="posts">📝 文章</button>
      <button class="tab-btn btn btn-outline btn-sm" data-tab="upload">📤 上传</button>
      <button class="tab-btn btn btn-outline btn-sm" data-tab="site">⚙️ 站点</button>
    </div>

    <div id="tab-tools" class="tab-content"></div>
    <div id="tab-nav" class="tab-content hidden"></div>
    <div id="tab-profile" class="tab-content hidden"></div>
    <div id="tab-posts" class="tab-content hidden"></div>
    <div id="tab-upload" class="tab-content hidden"></div>
    <div id="tab-site" class="tab-content hidden"></div>
  </div>
</div>

<script>
const REPO = "Grooty920/TmpPW", BRANCH = "master";
let TOKEN = "", toolsData = null, navData = null, profileData = null, toolsSha = null, navSha = null, profileSha = null;

function b64Decode(s) { try { return decodeURIComponent(escape(atob(s))); } catch(e) { return atob(s); } }
function b64Encode(s) { return btoa(unescape(encodeURIComponent(s))); }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

function showMsg(msg, type) {
  const el = document.getElementById("global-msg");
  el.className = "msg " + (type === "ok" ? "msg-ok" : "msg-err") + " hidden";
  el.textContent = msg; el.classList.remove("hidden");
  if (type === "ok") setTimeout(() => el.classList.add("hidden"), 4000);
}
function setStatus(ok) {
  document.getElementById("status-dot").style.background = ok ? "#4a6741" : "#d4c494";
  document.getElementById("status-text").textContent = ok ? "已连接" : "未连接";
}

// 登录
// 登录
document.getElementById("login-btn").onclick = () => { console.log("Login clicked");
  if (document.getElementById("pwd-input").value === "Grooty920") { console.log("Password correct");
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("main-screen").classList.remove("hidden");
    const saved = sessionStorage.getItem("gh_token");
    if (saved) { TOKEN = saved; document.getElementById("token-input").value = saved; doConnect(); }
  } else { console.log("Password wrong"); document.getElementById("login-err").style.display = "block"; }
};
document.getElementById("pwd-input").addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("login-btn").click(); });

document.getElementById("token-btn").onclick = doConnect;
document.getElementById("token-input").addEventListener("keydown", e => { if(e.key==="Enter") doConnect(); });

async function doConnect() {
  const input = document.getElementById("token-input"), err = document.getElementById("token-err");
  const token = input.value || sessionStorage.getItem("gh_token");
  if (!token) { err.textContent = "请输入 Token"; err.classList.remove("hidden"); return; }
  try {
    const r = await fetch("https://api.github.com/user", { headers: { "Authorization": "Bearer " + token } });
    if (!r.ok) throw new Error("Token 无效");
    TOKEN = token; sessionStorage.setItem("gh_token", token);
    document.getElementById("token-bar").classList.add("hidden");
    setStatus(true);
    const scopes = r.headers.get("X-OAuth-Scopes");
    if (scopes && !scopes.includes("repo")) showMsg("⚠️ Token 缺少 repo 权限，保存会失败", "err");
    showMsg("✅ 已连接：" + (await r.json()).login, "ok");
    loadAll();
  } catch(e) { err.textContent = e.message; err.classList.remove("hidden"); }
}

// 侧边栏切换
function switchTab(tab) {
  document.querySelectorAll(".sidebar-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
  var activeBtn = document.querySelector(".sidebar-btn[data-tab=\"" + tab + "\"]");
  if (activeBtn) activeBtn.classList.add("active");
  var contentEl = document.getElementById("tab-" + tab);
  if (contentEl) contentEl.classList.remove("hidden");
  document.getElementById("sidebar").classList.remove("open");
  switch(tab) {
    case "dashboard": renderDashboard(); break;
    case "posts": renderPosts(); break;
    case "editor": showNewPost(); break;
    case "tools": renderTools(); break;
    case "nav": renderNav(); break;
    case "profile": renderProfile(); break;
    case "upload": renderUpload(); break;
    case "site": renderSite(); break;
  }
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
}

// GitHub API
async function ghGet(path) {
  const r = await fetch("https://api.github.com/repos/"+REPO+"/contents/"+path+"?ref="+BRANCH, {
    headers: { "Authorization": "Bearer " + TOKEN, "Accept": "application/vnd.github.v3+json" }
  });
  if (!r.ok) throw new Error(path + " " + r.status);
  const d = await r.json();
  return { content: JSON.parse(b64Decode(d.content)), sha: d.sha };
}
async function ghPut(path, content, sha) {
  const r = await fetch("https://api.github.com/repos/"+REPO+"/contents/"+path, {
    method: "PUT",
    headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
    body: JSON.stringify({ message: "admin: " + path, content: b64Encode(JSON.stringify(content, null, 2)), sha: sha, branch: BRANCH })
  });
  if (!r.ok) { const t = await r.text(); try { const j=JSON.parse(t); throw new Error(j.message); } catch(e) { throw new Error("保存失败 " + r.status); } }
  return await r.json();
}

async function loadAll() {
  ["tools","nav","profile","posts"].forEach(id => document.getElementById("tab-"+id).innerHTML = "<p class='text-sm text-muted' style='padding:20px'>⏳ 加载中...</p>");
  try {
    const t = await ghGet("src/data/tools.json"); toolsData = t.content; toolsSha = t.sha;
    const n = await ghGet("src/data/navigation.json"); navData = n.content; navSha = n.sha;
    const p = await ghGet("src/data/profile.json"); profileData = p.content; profileSha = p.sha;
    renderTools(); renderNav(); renderProfile(); renderPosts();
    showMsg("✅ 数据加载成功", "ok");
  } catch(e) { showMsg("❌ " + e.message, "err"); }
}


// ===== 仪表盘 =====
async function renderDashboard() {
  var el = document.getElementById("tab-dashboard");
  if (!el) return;
  try {
    var r = await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts?ref="+BRANCH, {

          var t = fm.match(/tags:\s*\[([^\]]+)\]/);

    });
    var uploadR = await fetch("https://api.github.com/repos/"+REPO+"/contents/public/uploads?ref="+BRANCH, {

    });
    var uploadFiles = uploadR.ok ? (await uploadR.json()).length : 0;
    var recentPosts = posts.slice(-5).reverse();
    var recentHtml = "";
    recentPosts.forEach(function(f) {
      try {
        var c = b64Decode(f.content);
        var parts = c.split("---");
        var title = "", date = "";
        if (parts.length >= 3) {
          var fm = parts[1];
          var tm = fm.match(/title:\s*["']([^"']+)["']/);
          if (tm) title = tm[1];
          var dm = fm.match(/date:\s*["']?([^"'\s]+)["']?/);

        recentHtml += "<div class='post-card card'><div class='post-card-info'><div class='post-card-title'>" + (title || esc(f.name)) + "</div><div class='post-card-meta'>" + esc(f.name) + (date ? " <span class='post-date-tag'>" + date + "</span>" : "") + "</div></div></div>";

function makeDraggable(listId, dataArray, onReorder) {
  const container = document.getElementById(listId);
  if (!container) return;
  let dragEl = null;
  container.addEventListener("dragstart", e => {
    dragEl = e.target.closest(".drag-item");
    if (!dragEl) return;
    dragEl.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
  });
  container.addEventListener("dragend", e => {
    const el = e.target.closest(".drag-item");
    if (el) el.classList.remove("dragging");
    document.querySelectorAll(".drag-over").forEach(d => d.classList.remove("drag-over"));
  });
  container.addEventListener("dragover", e => {
    e.preventDefault(); e.dataTransfer.dropEffect = "move";
    const el = e.target.closest(".drag-item");
    if (!el || el === dragEl) return;
    document.querySelectorAll(".drag-over").forEach(d => d.classList.remove("drag-over"));
    el.classList.add("drag-over");
  });
  container.addEventListener("dragleave", e => {
    const el = e.target.closest(".drag-item");
    if (el) el.classList.remove("drag-over");
  });
  container.addEventListener("drop", e => {
    e.preventDefault();
    const el = e.target.closest(".drag-item");
    if (!el || !dragEl || el === dragEl) return;
    const from = parseInt(dragEl.dataset.index);
    const to = parseInt(el.dataset.index);
    if (isNaN(from) || isNaN(to)) return;
    const item = dataArray.splice(from, 1)[0];
    dataArray.splice(to, 0, item);
    onReorder();
  });
}

function toggleSelectAll() {
  var cb = document.getElementById("select-all");
  if (!cb) return;
  var cards = document.querySelectorAll("#post-list .post-select");
  cards.forEach(function(c) { c.checked = cb.checked; });

}
function updateBatchBar() {
  var selected = document.querySelectorAll("#post-list .post-select:checked");
  var bar = document.getElementById("batch-bar");
  if (!bar) return;
  if (selected.length > 0) {
    bar.classList.remove("hidden");
    bar.style.display = "flex";
    bar.innerHTML = "已选择 <strong>" + selected.length + "</strong> 篇文章 " +
      "<button onclick='batchDelete()' class='btn btn-outline btn-xs' style='color:#c73e3a'>批量删除</button> " +
      "<button onclick='batchSelectNone()' class='btn btn-outline btn-xs'>取消选择</button>";
  } else {
    bar.classList.add("hidden");
    bar.style.display = "none";
  }
}
function batchSelectNone() {
  document.querySelectorAll("#post-list .post-select").forEach(function(c) { c.checked = false; });
  var cb = document.getElementById("select-all");
  if (cb) cb.checked = false;
  updateBatchBar();
}
async function batchDelete() {
  var selected = document.querySelectorAll("#post-list .post-select:checked");
  if (selected.length === 0) return;
  if (!confirm("确定删除选中的 " + selected.length + " 篇文章？此操作不可撤销！")) return;
  if (!confirm("再次确认：删除 " + selected.length + " 篇文章？")) return;
  var count = 0;
  for (var i = 0; i < selected.length; i++) {
    try {
      var name = selected[i].getAttribute("data-name");
      var r = await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts/"+name+"?ref="+BRANCH, {
        headers: { "Authorization": "Bearer " + TOKEN, "Accept": "application/vnd.github.v3+json" }
      });
      if (!r.ok) continue;
      var d = await r.json();
      await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts/"+name, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
        body: JSON.stringify({ message: "批量删除: " + name, sha: d.sha, branch: BRANCH })
      });
      count++;
    } catch(e) {}
  }
  showMsg("已删除 " + count + " 篇文章", "ok");
  renderPosts();
}
async function duplicatePost(name) {
  try {
    var r = await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts/"+name+"?ref="+BRANCH, {
      headers: { "Authorization": "Bearer " + TOKEN, "Accept": "application/vnd.github.v3+json" }
    });
    if (!r.ok) throw new Error("获取失败");
    var d = await r.json();
    var content = b64Decode(d.content);
    var newName = name.replace(/\.(mdx|md)$/, "") + "-copy." + (name.endsWith(".mdx") ? "mdx" : "md");
    var newR = await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts/"+newName, {
      method: "PUT",
      headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({ message: "复制文章: " + newName, content: b64Encode(content), branch: BRANCH })
    });
    if (!newR.ok) throw new Error("复制失败");
    showMsg("已复制为: " + newName, "ok");
    renderPosts();
  } catch(e) { showMsg("错误: " + e.message, "err"); }
}
async function togglePostDraft(name) {
  try {
    var r = await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts/"+name+"?ref="+BRANCH, {
      headers: { "Authorization": "Bearer " + TOKEN, "Accept": "application/vnd.github.v3+json" }
    });
    if (!r.ok) throw new Error("获取失败");
    var d = await r.json();
    var content = b64Decode(d.content);
    if (content.indexOf("draft: true") >= 0) {
      content = content.replace("draft: true", "draft: false");
    } else if (content.indexOf("draft: false") >= 0) {
      content = content.replace("draft: false", "draft: true");
    } else {
      content = content.replace("---\n", "---\ndraft: true\n");
    }
    await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts/"+name, {
      method: "PUT",
      headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({ message: "切换草稿状态: " + name, content: b64Encode(content), sha: d.sha, branch: BRANCH })
    });
    showMsg("已切换草稿状态", "ok");
    renderPosts();
  } catch(e) { showMsg("错误: " + e.message, "err"); }
}

function filterPosts() {
  var q = document.getElementById("post-search");
  if (!q) return;
  q = q.value.toLowerCase();
  var cat = document.getElementById("post-cat-filter");
  cat = cat ? cat.value : "";
  var cards = document.querySelectorAll("#post-list .post-card");
  cards.forEach(function(card) {
    var title = (card.getAttribute("data-title") || "").toLowerCase();
    var cats = card.getAttribute("data-category") || "";
    var show = (!q || title.indexOf(q) >= 0) && (!cat || cats.indexOf(cat) >= 0);
    card.style.display = show ? "flex" : "none";
  });
}function mdRender(text) {
  var t = text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/^### (.+)$/gm, "<h3 style='margin:1em 0 0.5em;font-size:1.1em;color:#1c1c1c'>$1</h3>")
    .replace(/^## (.+)$/gm, "<h2 style='margin:1em 0 0.5em;font-size:1.3em;color:#1c1c1c'>$1</h2>")
    .replace(/^# (.+)$/gm, "<h1 style='margin:1em 0 0.5em;font-size:1.5em;color:#1c1c1c'>$1</h1>")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/`(.+?)`/g, "<code style='background:#f0e8cc;padding:1px 4px;border-radius:2px;font-size:0.9em'>$1</code>")
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, "<img src='$2' alt='$1' style='max-width:100%;border-radius:4px;margin:0.5em 0'>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, "<a href='$2' target='_blank' style='color:#c73e3a'>$1</a>")
    .replace(/^> (.+)$/gm, "<blockquote style='border-left:3px solid #c73e3a;padding:0.5em 1em;margin:0.5em 0;background:#fefcf5;color:#6b5f45'>$1</blockquote>")
    .replace(/^- (.+)$/gm, "<li style='margin:0.25em 0;color:#1c1c1c'>$1</li>");
  t = "<p style='line-height:1.8;color:#1c1c1c'>" + t + "</p>";
  t = t.replace(/\n\n/g, "</p><p style='line-height:1.8;color:#1c1c1c'>");
  t = t.replace(/\n/g, "<br>");
  return t;
}

function setupUpload() {
  const zone = document.getElementById("drop-zone"), input = document.getElementById("file-input");
  zone.onclick = () => input.click();
  zone.ondragover = e => { e.preventDefault(); zone.classList.add("dragover"); };
  zone.ondragleave = () => zone.classList.remove("dragover");
  zone.ondrop = e => { e.preventDefault(); zone.classList.remove("dragover"); if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]); };
  input.onchange = () => { if (input.files.length) uploadFile(input.files[0]); };
}
async function uploadFile(file) {
  const prog = document.getElementById("upload-progress"), result = document.getElementById("upload-result");
  prog.classList.remove("hidden"); prog.innerHTML = "⏳ 上传: " + file.name + " (" + (file.size/1024).toFixed(1) + "KB)...";
  result.classList.add("hidden");
  const name = Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9.-]/g, ""), path = "public/uploads/" + name;
  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    let sha = null;
    try { const r = await fetch("https://api.github.com/repos/"+REPO+"/contents/"+path+"?ref="+BRANCH, { headers: { "Authorization": "Bearer " + TOKEN } }); if (r.ok) sha = (await r.json()).sha; } catch(e) {}
    const r = await fetch("https://api.github.com/repos/"+REPO+"/contents/"+path, {
      method: "PUT",
      headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({ message: "上传: " + name, content: base64, sha: sha, branch: BRANCH })
    });
    if (!r.ok) throw new Error("上传失败 " + r.status);
    const url = "/uploads/" + name;
    prog.innerHTML = "✅ 上传成功！";
    result.classList.remove("hidden");
    document.getElementById("upload-url").value = url;
    document.getElementById("upload-url").select();
    try { await navigator.clipboard.writeText(url); } catch(e) {}
    setTimeout(() => listUploadedFiles(), 500);
  } catch(e) { prog.innerHTML = "❌ " + e.message; }
}
async function listUploadedFiles() {
  const el = document.getElementById("uploaded-files");

        <input id="site-github" value="${esc(p.github || "")}" class="w-full">
      </div>
      <button onclick="saveSite()" class="btn btn-ok btn-sm">💾 保存站点设置</button>
    </div>
    <div class="card">
      <h3 style="font-size:15px;margin-bottom:12px">🎨 主题色设置</h3>
      <div class="mb-3">
        <label>主色调 (accent)</label>
        <div class="flex gap-2">
          <input id="site-accent" value="${esc(p.accentColor || "#c73e3a")}" class="flex-1" style="font-family:monospace">
          <input type="color" id="site-accent-picker" value="${esc(p.accentColor || "#c73e3a")}" style="width:40px;height:40px;padding:2px;border:1px solid #e8e0cc;border-radius:4px;cursor:pointer" onchange="document.getElementById('site-accent').value=this.value">
        </div>
      </div>
      <div class="mb-3">
        <label>背景色</label>
        <div class="flex gap-2">
          <input id="site-bg" value="${esc(p.bgColor || "#f7f3e8")}" class="flex-1" style="font-family:monospace">
          <input type="color" id="site-bg-picker" value="${esc(p.bgColor || "#f7f3e8")}" style="width:40px;height:40px;padding:2px;border:1px solid #e8e0cc;border-radius:4px;cursor:pointer" onchange="document.getElementById('site-bg').value=this.value">
        </div>
      </div>
      <div class="mb-3">
        <label>文字主色</label>
        <div class="flex gap-2">
          <input id="site-text" value="${esc(p.textColor || "#1c1c1c")}" class="flex-1" style="font-family:monospace">
          <input type="color" id="site-text-picker" value="${esc(p.textColor || "#1c1c1c")}" style="width:40px;height:40px;padding:2px;border:1px solid #e8e0cc;border-radius:4px;cursor:pointer" onchange="document.getElementById('site-text').value=this.value">
        </div>
      </div>
      <button onclick="saveSite()" class="btn btn-ok btn-sm">💾 保存主题色</button>
    </div>`;
}

async function saveSite() {
  try {
    var data = {
      title: document.getElementById("site-title").value,
      description: document.getElementById("site-desc").value,
      heroText: document.getElementById("site-hero").value,
      subBio: document.getElementById("site-subbio").value,
      footer: document.getElementById("site-footer").value,
      email: document.getElementById("site-email").value,
      github: document.getElementById("site-github").value,
      accentColor: document.getElementById("site-accent").value,
      bgColor: document.getElementById("site-bg").value,
      textColor: document.getElementById("site-text").value
    };
    const r = await ghPut(SITE_PATH, data, siteSha);
    siteSha = r.content.sha;
    showMsg("✅ 站点设置已保存", "ok");
  } catch(e) { showMsg("❌ " + e.message, "err"); }
}

</script>
</body>
</html>
