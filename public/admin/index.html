<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>后台管理 · 小杨王子</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap");
@import url("https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap");
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");

:root {
  --accent: #c73e3a;
  --accent-light: rgba(199,62,58,0.08);
  --accent-dark: #a8322e;
  --bg: #f5f0e8;
  --bg-card: rgba(255,253,248,0.85);
  --bg-card-solid: #fffdf8;
  --text: #1c1c1c;
  --text-muted: #8a7e6a;
  --text-light: #b0a694;
  --border: rgba(180,165,130,0.2);
  --border-hover: rgba(199,62,58,0.3);
  --shadow: 0 1px 3px rgba(28,28,18,0.06), 0 1px 2px rgba(0,0,0,0.02);
  --shadow-lg: 0 8px 32px rgba(28,28,18,0.08);
  --radius: 10px;
  --radius-sm: 6px;
  --sidebar-width: 220px;
  --header-height: 56px;
  --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:"Noto Serif SC","LXGW WenKai",serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* ===== LOGIN PAGE ===== */
.login-wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:linear-gradient(135deg, #f5f0e8 0%, #ede6d8 50%, #f0e8dc 100%);
  position:relative;
  overflow:hidden;
}
.login-wrapper::before{
  content:'';
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle at 30% 40%, rgba(199,62,58,0.03) 0%, transparent 60%),
              radial-gradient(circle at 70% 60%, rgba(74,103,65,0.03) 0%, transparent 50%);
  animation:loginBg 20s ease-in-out infinite alternate;
}
@keyframes loginBg{
  0%{transform:translate(0,0) rotate(0deg)}
  100%{transform:translate(-5%,-5%) rotate(3deg)}
}
.login-card{
  position:relative;
  z-index:1;
  background:var(--bg-card-solid);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:16px;
  padding:48px 40px 40px;
  width:100%;
  max-width:400px;
  box-shadow:0 20px 60px rgba(28,28,18,0.08),0 8px 20px rgba(0,0,0,0.03);
  text-align:center;
  animation:loginFade 0.5s ease-out;
}
@keyframes loginFade{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
.login-logo{
  font-size:42px;
  margin-bottom:12px;
  display:block;
}
.login-card h1{
  font-family:"Ma Shan Zheng","Noto Serif SC",cursive;
  font-size:24px;
  letter-spacing:0.1em;
  color:var(--text);
  margin-bottom:4px;
}
.login-card p{
  font-size:13px;
  color:var(--text-muted);
  margin-bottom:28px;
}
.login-card input{
  width:100%;
  padding:12px 16px;
  border:1.5px solid var(--border);
  background:var(--bg);
  font-size:14px;
  font-family:inherit;
  outline:none;
  border-radius:var(--radius-sm);
  color:var(--text);
  text-align:center;
  transition:var(--transition);
  letter-spacing:0.1em;
}
.login-card input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-light);
}
.login-card .btn-primary{
  width:100%;
  margin-top:16px;
  padding:12px 24px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:var(--radius-sm);
  font-size:14px;
  font-family:inherit;
  font-weight:500;
  cursor:pointer;
  letter-spacing:0.1em;
  transition:var(--transition);
}
.login-card .btn-primary:hover{
  background:var(--accent-dark);
  transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(199,62,58,0.25);
}
.login-card .btn-primary:active{
  transform:translateY(0);
}
.login-err{
  margin-top:12px;
  padding:8px 12px;
  background:#fef2f2;
  color:var(--accent);
  border:1px solid rgba(199,62,58,0.2);
  border-radius:var(--radius-sm);
  font-size:13px;
  display:none;
}

/* ===== MAIN LAYOUT ===== */
#main-screen{
  display:none;
  min-height:100vh;
}
#main-screen:not(.hidden){
  display:block;
}
.main-wrapper{
  display:flex;
  min-height:100vh;
}

/* ===== HEADER ===== */
.admin-header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:var(--header-height);
  background:var(--bg-card-solid);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  z-index:1000;
}
.admin-header-left{
  display:flex;
  align-items:center;
  gap:16px;
}
.admin-title{
  font-family:"Ma Shan Zheng","Noto Serif SC",cursive;
  font-size:20px;
  letter-spacing:0.15em;
  color:var(--text);
}
.admin-header-right{
  display:flex;
  align-items:center;
  gap:16px;
}
.status-indicator{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:var(--text-muted);
}
.status-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#d4c494;
  display:inline-block;
  transition:var(--transition);
}
.admin-version{
  font-size:10px;
  color:var(--text-light);
  background:rgba(180,165,130,0.1);
  padding:3px 10px;
  border-radius:20px;
  letter-spacing:0.05em;
}
#sidebar-toggle{
  display:none;
  background:none;
  border:none;
  font-size:20px;
  cursor:pointer;
  color:var(--text-muted);
  padding:4px;
  border-radius:var(--radius-sm);
  transition:var(--transition);
}
#sidebar-toggle:hover{
  background:var(--accent-light);
  color:var(--accent);
}

/* ===== SIDEBAR ===== */
.sidebar{
  position:fixed;
  top:var(--header-height);
  left:0;
  bottom:0;
  width:var(--sidebar-width);
  background:var(--bg-card);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  z-index:999;
  transition:transform 0.3s ease;
  overflow-y:auto;
  overflow-x:hidden;
}
.sidebar-nav{
  flex:1;
  padding:12px 10px;
  display:flex;
  flex-direction:column;
  gap:2px;
}
.sidebar-section-label{
  font-size:10px;
  color:var(--text-light);
  letter-spacing:0.1em;
  padding:16px 14px 6px;
  text-transform:uppercase;
  font-weight:500;
}
.sidebar-btn{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  padding:10px 14px;
  border:none;
  background:transparent;
  font-size:13px;
  font-family:inherit;
  color:var(--text-muted);
  cursor:pointer;
  border-radius:var(--radius-sm);
  transition:var(--transition);
  text-align:left;
  position:relative;
}
.sidebar-btn:hover{
  background:var(--accent-light);
  color:var(--text);
}
.sidebar-btn.active{
  background:var(--accent-light);
  color:var(--accent);
  font-weight:500;
}
.sidebar-btn.active::before{
  content:'';
  position:absolute;
  left:-2px;
  top:50%;
  transform:translateY(-50%);
  width:3px;
  height:20px;
  background:var(--accent);
  border-radius:0 3px 3px 0;
}
.sidebar-icon{
  font-size:16px;
  width:24px;
  text-align:center;
  flex-shrink:0;
}
.sidebar-footer{
  padding:12px 10px;
  border-top:1px solid var(--border);
}
.sidebar-footer a{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  text-decoration:none;
  font-size:12px;
  color:var(--text-muted);
  border-radius:var(--radius-sm);
  transition:var(--transition);
  font-family:inherit;
}
.sidebar-footer a:hover{
  background:var(--accent-light);
  color:var(--accent);
}

/* ===== CONTENT ===== */
.admin-content{
  margin-left:var(--sidebar-width);
  margin-top:var(--header-height);
  flex:1;
  padding:28px 32px;
  min-height:calc(100vh - var(--header-height));
  max-width:1200px;
}
.tab-content{
  display:block;
  animation:tabFade 0.3s ease-out;
}
.tab-content.hidden{
  display:none;
}
@keyframes tabFade{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* ===== TOKEN BAR ===== */
#token-bar{
  background:var(--bg-card-solid);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 24px;
  margin-bottom:24px;
  box-shadow:var(--shadow);
}
#token-bar .flex{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}
#token-bar input{
  flex:1;
  min-width:200px;
  padding:10px 14px;
  border:1.5px solid var(--border);
  background:var(--bg);
  font-size:13px;
  font-family:inherit;
  outline:none;
  border-radius:var(--radius-sm);
  color:var(--text);
  transition:var(--transition);
}
#token-bar input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-light);
}
#token-bar a{
  font-size:12px;
  color:var(--accent);
  text-decoration:none;
  transition:var(--transition);
  white-space:nowrap;
}
#token-bar a:hover{
  text-decoration:underline;
}

/* ===== CARDS ===== */
.card{
  background:var(--bg-card-solid);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px;
  box-shadow:var(--shadow);
  transition:var(--transition);
}
.card:hover{
  border-color:var(--border-hover);
  box-shadow:var(--shadow-lg);
}
.card h3{
  font-family:"Ma Shan Zheng","Noto Serif SC",cursive;
  font-size:16px;
  letter-spacing:0.05em;
  margin-bottom:12px;
  color:var(--text);
}
.card p{
  font-size:13px;
  color:var(--text-muted);
  line-height:1.7;
}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:9px 18px;
  border:none;
  font-size:13px;
  font-family:inherit;
  cursor:pointer;
  letter-spacing:0.03em;
  transition:var(--transition);
  border-radius:var(--radius-sm);
  font-weight:500;
  white-space:nowrap;
}
.btn:hover{
  transform:translateY(-1px);
}
.btn:active{
  transform:translateY(0);
}
.btn-primary{
  background:var(--accent);
  color:#fff;
  border:1px solid var(--accent);
}
.btn-primary:hover{
  background:var(--accent-dark);
  box-shadow:0 4px 20px rgba(199,62,58,0.2);
}
.btn-ok{
  background:#4a6741;
  color:#fff;
  border:1px solid #4a6741;
}
.btn-ok:hover{
  background:#3d5a35;
  box-shadow:0 4px 20px rgba(74,103,65,0.2);
}
.btn-outline{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-muted);
}
.btn-outline:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:var(--accent-light);
}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px}
.btn-danger{
  background:#dc2626;
  color:#fff;
  border:1px solid #dc2626;
}
.btn-danger:hover{
  background:#b91c1c;
}

/* ===== FORM ELEMENTS ===== */
input,textarea,select{
  width:100%;
  padding:10px 14px;
  border:1.5px solid var(--border);
  background:var(--bg);
  font-size:13px;
  font-family:inherit;
  outline:none;
  transition:var(--transition);
  border-radius:var(--radius-sm);
  color:var(--text);
}
input:focus,textarea:focus,select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-light);
}
textarea{resize:vertical;min-height:80px;line-height:1.7}
label{
  display:block;
  font-size:12px;
  color:var(--text-muted);
  margin-bottom:4px;
  letter-spacing:0.03em;
  font-weight:500;
}

/* ===== UTILITY ===== */
.hidden{display:none!important}
.flex{display:flex;gap:10px}
.flex-1{flex:1}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.flex-wrap{flex-wrap:wrap}
.flex-col{flex-direction:column}
.gap-2{gap:8px}
.gap-3{gap:12px}
.gap-4{gap:16px}
.mb-2{margin-bottom:8px}
.mb-3{margin-bottom:12px}
.mb-4{margin-bottom:16px}
.mb-6{margin-bottom:24px}
.mt-2{margin-top:8px}
.mt-3{margin-top:12px}
.mt-4{margin-top:16px}
.text-sm{font-size:13px}
.text-xs{font-size:12px}
.text-muted{color:var(--text-muted)}
.text-accent{color:var(--accent)}
.w-full{width:100%}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ===== MESSAGES ===== */
.msg{
  padding:12px 18px;
  font-size:13px;
  border-radius:var(--radius-sm);
  border:1px solid;
  margin-bottom:16px;
  animation:msgFade 0.3s ease-out;
}
@keyframes msgFade{
  from{opacity:0;transform:translateY(-8px)}
  to{opacity:1;transform:translateY(0)}
}
.msg-ok{background:#f0f7ee;color:#4a6741;border-color:rgba(74,103,65,0.2)}
.msg-err{background:#fef2f2;color:var(--accent);border-color:rgba(199,62,58,0.2)}

/* ===== DASHBOARD STATS ===== */
.dashboard-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
  gap:16px;
  margin-bottom:28px;
}
.stat-card{
  padding:24px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.stat-card::after{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:3px;
  background:var(--accent);
  opacity:0.3;
}
.stat-card .stat-icon{font-size:28px;margin-bottom:10px}
.stat-card .stat-number{
  font-size:30px;
  font-weight:600;
  color:var(--accent);
  font-family:"Ma Shan Zheng",cursive;
  line-height:1.2;
}
.stat-card .stat-label{
  font-size:12px;
  color:var(--text-muted);
  margin-top:4px;
}

/* ===== POST CARDS ===== */
.post-card{
  padding:18px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:10px;
  background:var(--bg-card-solid);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  transition:var(--transition);
}
.post-card:hover{
  border-color:var(--border-hover);
  box-shadow:var(--shadow);
}
.post-card-info{flex:1;min-width:200px}
.post-card-title{font-size:14px;font-weight:500;color:var(--text)}
.post-card-meta{
  font-size:11px;
  color:var(--text-muted);
  margin-top:4px;
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}
.post-card-desc{font-size:11px;color:var(--text-muted);margin-top:2px;opacity:0.7}
.post-card-actions{display:flex;gap:6px;flex-shrink:0}
.post-cat-tag{
  background:var(--accent-light);
  padding:2px 8px;
  border-radius:3px;
  font-size:10px;
  color:var(--accent);
}
.post-date-tag{color:#4a6741;font-size:11px}

/* ===== SEARCH BAR ===== */
.search-bar{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.search-bar input{flex:1;min-width:150px}
.search-bar select{width:auto;min-width:110px}

/* ===== EDITOR ===== */
.editor-layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  min-height:500px;
}
.editor-pane{display:flex;flex-direction:column}
.editor-pane textarea{
  flex:1;
  min-height:400px;
  font-family:"LXGW WenKai","Courier New",monospace;
  font-size:13px;
  line-height:1.8;
  padding:20px;
  resize:vertical;
}
.preview-pane{
  padding:20px;
  border:1.5px solid var(--border);
  background:var(--bg-card-solid);
  border-radius:var(--radius-sm);
  overflow-y:auto;
  min-height:400px;
  line-height:1.8;
}
.preview-pane h1{font-size:1.5em;font-family:"Ma Shan Zheng",cursive}
.editor-toolbar{
  display:flex;
  gap:4px;
  margin-bottom:10px;
  flex-wrap:wrap;
}
.editor-toolbar button{font-size:12px;padding:4px 10px}
@media (max-width:768px){.editor-layout{grid-template-columns:1fr}}

/* ===== FILE GRID ===== */
.file-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
  gap:14px;
}
.file-item{
  text-align:center;
  padding:16px 12px;
  background:var(--bg-card-solid);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  transition:var(--transition);
}
.file-item:hover{
  border-color:var(--border-hover);
  box-shadow:var(--shadow);
}
.file-item img{
  max-width:100%;
  height:90px;
  object-fit:cover;
  margin-bottom:8px;
  border-radius:var(--radius-sm);
}
.file-item .file-name{
  font-size:10px;
  word-break:break-all;
  color:var(--text-muted);
}

/* ===== UPLOAD ZONE ===== */
.upload-zone{
  border:2px dashed var(--border);
  padding:40px 20px;
  text-align:center;
  cursor:pointer;
  transition:var(--transition);
  background:var(--bg);
  border-radius:var(--radius);
}
.upload-zone:hover,.upload-zone.dragover{
  border-color:var(--accent);
  background:var(--accent-light);
}
.upload-zone .icon{font-size:36px;margin-bottom:12px}
.upload-zone p{font-size:13px;color:var(--text-muted)}

/* ===== DRAG ITEMS ===== */
.drag-item{
  cursor:grab;
  transition:all 0.15s;
  user-select:none;
  padding:12px 16px;
  background:var(--bg-card-solid);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:8px;
}
.drag-item:hover{border-color:var(--border-hover)!important}
.drag-item.dragging{opacity:0.4}
.drag-item.drag-over{
  border-color:var(--accent)!important;
  border-style:dashed!important;
  background:var(--accent-light)!important;
}
.drag-handle{
  cursor:grab;
  font-size:16px;
  color:var(--text-light);
  flex-shrink:0;
}
.drag-handle:hover{color:var(--accent)}

/* ===== COLOR PICKER ===== */
.color-row{
  display:flex;
  gap:10px;
  align-items:center;
}
.color-row input[type="text"]{flex:1;font-family:monospace;font-size:12px}
.color-picker{
  width:42px;
  height:42px;
  padding:2px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  cursor:pointer;
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:8px 0 30px rgba(0,0,0,0.1)}
  #sidebar-toggle{display:flex}
  .admin-content{margin-left:0;padding:20px 16px}
  .admin-header{padding:0 16px}
  .admin-header-right .status-indicator{display:none}
  .dashboard-grid{grid-template-columns:repeat(2,1fr)}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .stat-card{padding:16px 14px}
  .stat-card .stat-number{font-size:24px}
}
@media (max-width:480px){
  .dashboard-grid{grid-template-columns:1fr}
  .login-card{padding:32px 24px}
  .admin-content{padding:16px 12px}
}
</style>
</head>
<body>

function b64Decode(s) { try { return decodeURIComponent(escape(atob(s))); } catch(e) { return atob(s); } }
function b64Encode(s) { return btoa(unescape(encodeURIComponent(s))); }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

function showMsg(msg, type) {
  const el = document.getElementById("global-msg");
  el.className = "msg " + (type === "ok" ? "msg-ok" : "msg-err") + " hidden";
  el.textContent = msg; el.classList.remove("hidden");
  if (type === "ok") setTimeout(() => el.classList.add("hidden"), 4000);
}
function setStatus(ok) {
  document.getElementById("status-dot").style.background = ok ? "#4a6741" : "#d4c494";
  document.getElementById("status-text").textContent = ok ? "已连接" : "未连接";
}

// 登录

document.getElementById("login-btn").onclick = () => { console.log("Login clicked");

async function doConnect() {
  const input = document.getElementById("token-input"), err = document.getElementById("token-err");
  const token = input.value || sessionStorage.getItem("gh_token");
  if (!token) { err.textContent = "请输入 Token"; err.classList.remove("hidden"); return; }
  try {
    const r = await fetch("https://api.github.com/user", { headers: { "Authorization": "Bearer " + token } });
    if (!r.ok) throw new Error("Token 无效");
    TOKEN = token; sessionStorage.setItem("gh_token", token);
    document.getElementById("token-bar").classList.add("hidden");
    setStatus(true);
    const scopes = r.headers.get("X-OAuth-Scopes");
    if (scopes && !scopes.includes("repo")) showMsg("⚠️ Token 缺少 repo 权限，保存会失败", "err");
    showMsg("✅ 已连接：" + (await r.json()).login, "ok");
    loadAll();
  } catch(e) { err.textContent = e.message; err.classList.remove("hidden"); }
}

// GitHub API
async function ghGet(path) {
  const r = await fetch("https://api.github.com/repos/"+REPO+"/contents/"+path+"?ref="+BRANCH, {
    headers: { "Authorization": "Bearer " + TOKEN, "Accept": "application/vnd.github.v3+json" }
  });
  if (!r.ok) throw new Error(path + " " + r.status);
  const d = await r.json();
  return { content: JSON.parse(b64Decode(d.content)), sha: d.sha };
}
async function ghPut(path, content, sha) {
  const r = await fetch("https://api.github.com/repos/"+REPO+"/contents/"+path, {
    method: "PUT",
    headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
    body: JSON.stringify({ message: "admin: " + path, content: b64Encode(JSON.stringify(content, null, 2)), sha: sha, branch: BRANCH })
  });
  if (!r.ok) { const t = await r.text(); try { const j=JSON.parse(t); throw new Error(j.message); } catch(e) { throw new Error("保存失败 " + r.status); } }
  return await r.json();
}

async function loadAll() {
  ["tools","nav","profile","posts"].forEach(id => document.getElementById("tab-"+id).innerHTML = "<p class='text-sm text-muted' style='padding:20px'>⏳ 加载中...</p>");
  try {

    const n = await ghGet("src/data/navigation.json"); navData = n.content; navSha = n.sha;
    const p = await ghGet("src/data/profile.json"); profileData = p.content; profileSha = p.sha;
    renderTools(); renderNav(); renderProfile(); renderPosts();
    showMsg("✅ 数据加载成功", "ok");
  } catch(e) { showMsg("❌ " + e.message, "err"); }
}


// ===== 仪表盘 =====
async function renderDashboard() {
  var el = document.getElementById("tab-dashboard");
  if (!el) return;
  try {
    var r = await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts?ref="+BRANCH, {
      headers: { "Authorization": "Bearer " + TOKEN, "Accept": "application/vnd.github.v3+json" }
    });
    var files = r.ok ? await r.json() : [];
    var posts = files.filter(function(f) { return f.name.endsWith(".mdx") || f.name.endsWith(".md"); });
    var cats = {}, tags = {};
    posts.forEach(function(f) {
      try {
        var c = b64Decode(f.content);
        var parts = c.split("---");
        if (parts.length >= 3) {
          var fm = parts[1];
          var m = fm.match(/category:\s*["']([^"']+)["']/);
          if (m) cats[m[1]] = (cats[m[1]] || 0) + 1;
          var t = fm.match(/tags:\s*\[([^\]]+)\]/);
          if (t) t[1].split(",").forEach(function(tag) {
            var tg = tag.trim().replace(/["']/g, "");
            if (tg) tags[tg] = (tags[tg] || 0) + 1;
          });
        }
      } catch(e) {}
    });
    var uploadR = await fetch("https://api.github.com/repos/"+REPO+"/contents/public/uploads?ref="+BRANCH, {
      headers: { "Authorization": "Bearer " + TOKEN, "Accept": "application/vnd.github.v3+json" }
    });
    var uploadFiles = uploadR.ok ? (await uploadR.json()).length : 0;
    var recentPosts = posts.slice(-5).reverse();
    var recentHtml = "";
    recentPosts.forEach(function(f) {
      try {
        var c = b64Decode(f.content);
        var parts = c.split("---");
        var title = "", date = "";
        if (parts.length >= 3) {
          var fm = parts[1];
          var tm = fm.match(/title:\s*["']([^"']+)["']/);
          if (tm) title = tm[1];
          var dm = fm.match(/date:\s*["']?([^"'\s]+)["']?/);
          if (dm) date = dm[1];
        }
        recentHtml += "<div class='post-card card'><div class='post-card-info'><div class='post-card-title'>" + (title || esc(f.name)) + "</div><div class='post-card-meta'>" + esc(f.name) + (date ? " <span class='post-date-tag'>" + date + "</span>" : "") + "</div></div></div>";
      } catch(e) {}
    });
    if (!recentHtml) recentHtml = "<p class='text-sm text-muted'>暂无文章</p>";
    el.innerHTML = `
      <div class="dashboard-grid">
        <div class="stat-card card"><div class="stat-icon">📄</div><div class="stat-number">${posts.length}</div><div class="stat-label">文章总数</div></div>
        <div class="stat-card card"><div class="stat-icon">📂</div><div class="stat-number">${Object.keys(cats).length}</div><div class="stat-label">分类</div></div>
        <div class="stat-card card"><div class="stat-icon">🏷️</div><div class="stat-number">${Object.keys(tags).length}</div><div class="stat-label">标签</div></div>
        <div class="stat-card card"><div class="stat-icon">📤</div><div class="stat-number">${uploadFiles}</div><div class="stat-label">文件</div></div>
      </div>
      <div class="card mb-4"><h3 style="font-size:15px;margin-bottom:12px">📈 最近发布</h3>${recentHtml}</div>
      <div class="card"><h3 style="font-size:15px;margin-bottom:12px">⚡ 快捷操作</h3>
        <div class="flex gap-2 flex-wrap">
          <button onclick="switchTab('editor')" class="btn btn-primary btn-sm">✏️ 写文章</button>
          <button onclick="switchTab('upload')" class="btn btn-outline btn-sm">📤 上传文件</button>
          <button onclick="switchTab('tools')" class="btn btn-outline btn-sm">🔧 管理工具</button>
          <button onclick="switchTab('site')" class="btn btn-outline btn-sm">⚙️ 站点设置</button>
        </div>
      </div>`;
  } catch(e) { el.innerHTML = "<p class='text-sm text-accent'>加载失败: " + e.message + "</p>"; }
}// ===== 拖拽工具 =====
function makeDraggable(listId, dataArray, onReorder) {
  const container = document.getElementById(listId);
  if (!container) return;
  let dragEl = null;
  container.addEventListener("dragstart", e => {
    dragEl = e.target.closest(".drag-item");
    if (!dragEl) return;
    dragEl.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
  });
  container.addEventListener("dragend", e => {
    const el = e.target.closest(".drag-item");
    if (el) el.classList.remove("dragging");
    document.querySelectorAll(".drag-over").forEach(d => d.classList.remove("drag-over"));
  });
  container.addEventListener("dragover", e => {
    e.preventDefault(); e.dataTransfer.dropEffect = "move";
    const el = e.target.closest(".drag-item");
    if (!el || el === dragEl) return;
    document.querySelectorAll(".drag-over").forEach(d => d.classList.remove("drag-over"));
    el.classList.add("drag-over");
  });
  container.addEventListener("dragleave", e => {
    const el = e.target.closest(".drag-item");
    if (el) el.classList.remove("drag-over");
  });
  container.addEventListener("drop", e => {
    e.preventDefault();
    const el = e.target.closest(".drag-item");
    if (!el || !dragEl || el === dragEl) return;
    const from = parseInt(dragEl.dataset.index);
    const to = parseInt(el.dataset.index);
    if (isNaN(from) || isNaN(to)) return;
    const item = dataArray.splice(from, 1)[0];
    dataArray.splice(to, 0, item);
    onReorder();
  });
}

function renderTools() {

        <input value="${esc(cat.name)}" onchange="toolsData.categories[${ci}].name=this.value" style="width:120px">
        <input value="${esc(cat.subtitle||"")}" onchange="toolsData.categories[${ci}].subtitle=this.value||null" style="width:180px" placeholder="副标题">
        <button onclick="deleteToolCategory(${ci})" class="btn btn-outline btn-xs">✕</button>
      </div>
      <div id="tool-items-${ci}" class="grid-2">`;
    cat.items.forEach((item, ii) => {
      html += `<div class="drag-item card" style="padding:10px;background:#f7f3e8;border:1px solid #e8e0cc" draggable="true" data-index="${ii}">
        <div class="flex items-center mb-2"><span class="drag-handle">⠿</span>
          <input value="${esc(item.title)}" onchange="toolsData.categories[${ci}].items[${ii}].title=this.value" placeholder="名称" style="flex:1">
        </div>
        <div class="mb-2"><input value="${esc(item.description||"")}" onchange="toolsData.categories[${ci}].items[${ii}].description=this.value" placeholder="描述"></div>
        <div class="flex gap-2 items-center">
          <input value="${esc(item.url)}" onchange="toolsData.categories[${ci}].items[${ii}].url=this.value" placeholder="URL" style="flex:1">
          <button onclick="deleteItem(${ci},${ii})" class="btn btn-outline btn-xs">✕</button>
        </div>
      </div>`;
    });
    html += `</div><button onclick="addItem(${ci})" class="btn btn-outline btn-sm mt-2">+ 添加工具</button></div>`;
  });
  document.getElementById("tab-tools").innerHTML = html;
  // 启用拖拽
  toolsData.categories.forEach((cat, ci) => {
    makeDraggable("tool-items-" + ci, cat.items, () => renderTools());
  });
}
function addToolCategory() { toolsData.categories.push({id:"c"+Date.now(),name:"新分类",subtitle:null,accentColor:"var(--accent)",items:[]}); renderTools(); }
function deleteToolCategory(i) { if(!confirm("确定删除？")) return; toolsData.categories.splice(i,1); renderTools(); }
function addItem(ci) { toolsData.categories[ci].items.push({title:"新工具",description:"",url:"https://",icon:"link",isLocal:false}); renderTools(); }
function deleteItem(ci,ii) { toolsData.categories[ci].items.splice(ii,1); renderTools(); }
async function saveTools() { try { const r=await ghPut("src/data/tools.json",toolsData,toolsSha); toolsSha=r.content.sha; showMsg("✅ 工具已保存","ok"); } catch(e) { showMsg("❌ "+e.message,"err"); } }

  for (var i = 0; i < selected.length; i++) {
    try {
      var name = selected[i].getAttribute("data-name");

        headers: { "Authorization": "Bearer " + TOKEN, "Accept": "application/vnd.github.v3+json" }

async function togglePostDraft(name) {
  try {

      headers: { "Authorization": "Bearer " + TOKEN, "Accept": "application/vnd.github.v3+json" }
    });

    var d = await r.json();

      content = content.replace("---\n", "---\ndraft: true\n");
    }
    await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts/"+name, {
      method: "PUT",
      headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },

function filterPosts() {
  var q = document.getElementById("post-search");
  if (!q) return;
  q = q.value.toLowerCase();
  var cat = document.getElementById("post-cat-filter");
  cat = cat ? cat.value : "";
  var cards = document.querySelectorAll("#post-list .post-card");
  cards.forEach(function(card) {
    var title = (card.getAttribute("data-title") || "").toLowerCase();
    var cats = card.getAttribute("data-category") || "";
    var show = (!q || title.indexOf(q) >= 0) && (!cat || cats.indexOf(cat) >= 0);
    card.style.display = show ? "flex" : "none";
  });
}function mdRender(text) {
  var t = text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/^### (.+)$/gm, "<h3 style='margin:1em 0 0.5em;font-size:1.1em;color:#1c1c1c'>$1</h3>")
    .replace(/^## (.+)$/gm, "<h2 style='margin:1em 0 0.5em;font-size:1.3em;color:#1c1c1c'>$1</h2>")
    .replace(/^# (.+)$/gm, "<h1 style='margin:1em 0 0.5em;font-size:1.5em;color:#1c1c1c'>$1</h1>")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/`(.+?)`/g, "<code style='background:#f0e8cc;padding:1px 4px;border-radius:2px;font-size:0.9em'>$1</code>")
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, "<img src='$2' alt='$1' style='max-width:100%;border-radius:4px;margin:0.5em 0'>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, "<a href='$2' target='_blank' style='color:#c73e3a'>$1</a>")
    .replace(/^> (.+)$/gm, "<blockquote style='border-left:3px solid #c73e3a;padding:0.5em 1em;margin:0.5em 0;background:#fefcf5;color:#6b5f45'>$1</blockquote>")
    .replace(/^- (.+)$/gm, "<li style='margin:0.25em 0;color:#1c1c1c'>$1</li>");
  t = "<p style='line-height:1.8;color:#1c1c1c'>" + t + "</p>";
  t = t.replace(/\n\n/g, "</p><p style='line-height:1.8;color:#1c1c1c'>");
  t = t.replace(/\n/g, "<br>");
  return t;
}

async function updatePost(name, sha) {
  var slug = document.getElementById("np-slug").value.trim();
  var title = document.getElementById("np-title").value.trim();
  var desc = document.getElementById("np-desc").value.trim();
  var cat = document.getElementById("np-cat").value.trim();
  var tags = document.getElementById("np-tags").value.split(",").map(function(t) { return t.trim(); });
  var cover = document.getElementById("np-cover").value.trim();
  var body = document.getElementById("np-body").value;
  var msg = document.getElementById("np-msg");
  if (!slug || !title || !desc) { msg.textContent = "请填写文件名、标题和描述"; msg.style.color = "#c73e3a"; return; }
  try {
    var r = await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts/"+name+"?ref="+BRANCH, {
      headers: { "Authorization": "Bearer " + TOKEN, "Accept": "application/vnd.github.v3+json" }
    });
    var oldData = await r.json();
    var oldContent = b64Decode(oldData.content);
    var oldParts = oldContent.split("---");
    var oldFm = oldParts[1] || "";
    var dateMatch = oldFm.match(/date:\s*["']([^"']+)["']/);
    var date = dateMatch ? dateMatch[1] : new Date().toISOString().split("T")[0];
    var fm = "---\ntitle: \"" + title + "\"\ndescription: \"" + desc + "\"\ndate: " + date + "\ncategory: \"" + cat + "\"\ntags: " + JSON.stringify(tags) + "\n" + (cover ? "coverImage: \"" + cover + "\"\n" : "") + "readingTime: 5\n---\n";
    var putR = await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts/"+slug+".mdx", {
      method: "PUT",
      headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({ message: "更新文章: " + title, content: b64Encode(fm + body), sha: sha, branch: BRANCH })
    });
    if (!putR.ok) throw new Error("更新失败 " + putR.status);
    msg.textContent = "✅ 文章已更新！"; msg.style.color = "#4a6741";
    setTimeout(function() { renderPosts(); document.getElementById("new-post-form").classList.add("hidden"); }, 1000);
  } catch(e) { msg.textContent = "❌ " + e.message; msg.style.color = "#c73e3a"; }
}

function setupUpload() {
  const zone = document.getElementById("drop-zone"), input = document.getElementById("file-input");
  zone.onclick = () => input.click();
  zone.ondragover = e => { e.preventDefault(); zone.classList.add("dragover"); };
  zone.ondragleave = () => zone.classList.remove("dragover");
  zone.ondrop = e => { e.preventDefault(); zone.classList.remove("dragover"); if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]); };
  input.onchange = () => { if (input.files.length) uploadFile(input.files[0]); };
}
async function uploadFile(file) {
  const prog = document.getElementById("upload-progress"), result = document.getElementById("upload-result");
  prog.classList.remove("hidden"); prog.innerHTML = "⏳ 上传: " + file.name + " (" + (file.size/1024).toFixed(1) + "KB)...";
  result.classList.add("hidden");
  const name = Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9.-]/g, ""), path = "public/uploads/" + name;
  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    let sha = null;
    try { const r = await fetch("https://api.github.com/repos/"+REPO+"/contents/"+path+"?ref="+BRANCH, { headers: { "Authorization": "Bearer " + TOKEN } }); if (r.ok) sha = (await r.json()).sha; } catch(e) {}
    const r = await fetch("https://api.github.com/repos/"+REPO+"/contents/"+path, {
      method: "PUT",
      headers: { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({ message: "上传: " + name, content: base64, sha: sha, branch: BRANCH })
    });
    if (!r.ok) throw new Error("上传失败 " + r.status);
    const url = "/uploads/" + name;
    prog.innerHTML = "✅ 上传成功！";
    result.classList.remove("hidden");
    document.getElementById("upload-url").value = url;
    document.getElementById("upload-url").select();
    try { await navigator.clipboard.writeText(url); } catch(e) {}
    setTimeout(() => listUploadedFiles(), 500);
  } catch(e) { prog.innerHTML = "❌ " + e.message; }
}
async function listUploadedFiles() {
  const el = document.getElementById("uploaded-files");
  try {
    const r = await fetch("https://api.github.com/repos/"+REPO+"/contents/public/uploads?ref="+BRANCH, {
      headers: { "Authorization": "Bearer " + TOKEN, "Accept": "application/vnd.github.v3+json" }
    });
    if (!r.ok) { el.innerHTML = "<p class='text-sm text-muted'>暂无文件</p>"; return; }
    const files = await r.json();
    if (!files.length) { el.innerHTML = "<p class='text-sm text-muted'>暂无文件</p>"; return; }
    let html = "<div class='grid-2'>";
    files.slice().reverse().slice(0,30).forEach(f => {
      const isImg = f.name.match(/\.(png|jpg|jpeg|webp|gif|svg)$/i);
      html += `<div style="border:1px solid #e8e0cc;padding:8px;text-align:center;background:#f7f3e8">
        ${isImg ? `<img src="/uploads/${f.name}" style="max-width:100%;height:60px;object-fit:cover;margin-bottom:4px">` : "📄"}
        <div style="font-size:11px;word-break:break-all">${f.name}</div>
        <button onclick="copyUrl('${f.name}')" class="btn btn-outline btn-xs mt-2">复制链接</button>
      </div>`;
    });
    html += "</div>"; el.innerHTML = html;
  } catch(e) { el.innerHTML = "<p class='text-sm text-muted'>加载失败</p>"; }
}
function copyUrl(name) { const url="/uploads/"+name; try { navigator.clipboard.writeText(url); } catch(e) {} showMsg("✅ 已复制: " + url, "ok"); }

var d=[];if(r.ok){var j=await r.json();d=JSON.parse(b64Decode(j.content));friendLinksSha=j.sha}else{friendLinksSha=null}
friendLinks=d;var h="<div class=\"card\"><h3>🏷️ 标签管理</h3><p>? "+d.length+" 个标签</p>"
h+="<div class=\"card\" style=\"padding:16px;background:rgba(199,62,58,0.03);border:1px dashed rgba(199,62,58,0.2)\"><h4>添加新链接</h4>"
h+="<div class=\"grid-2 mb-2\"><div><label>名称</label><input id=\"fl-name\" placeholder=\"名称\"></div><div><label>URL</label><input id=\"fl-url\" placeholder=\"https://\"></div></div>"
h+="<div class=\"grid-2 mb-2\"><div><label>名称</label><input id=\"fl-desc\" placeholder=\"??\"></div><div><label>??URL</label><input id=\"fl-avatar\" placeholder=\"??\"></div></div>"
h+="<button onclick=\"addFriendLink()\" class=\"btn btn-ok btn-sm\">＋ 添加</button></div>"
if(d.length>0){h+="<div style=\"display:grid;gap:8px\">";d.forEach(function(link,i){h+="<div class=\"card\" style=\"padding:12px 16px;display:flex;justify-content:space-between;align-items:center\"><div style=\"display:flex;align-items:center;gap:10px\">"+(link.avatar?"<img src=\""+esc(link.avatar)+"\" style=\"width:32px;height:32px;border-radius:50%\">":"<div style=\"width:32px;height:32px;border-radius:50%;background:#c73e3a;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px\">"+(link.name||"?")[0]+"</div>")+"<div><div>"+esc(link.name)+"</div><div class=\"text-xs text-muted\">"+esc(link.url)+"</div></div></div><div class=\"flex gap-2\"><button onclick=\"editFriendLink("+i+")\" class=\"btn btn-outline btn-xs\">??</button><button onclick=\"deleteFriendLink("+i+")\" class=\"btn btn-primary btn-xs\">删除</button></div></div>"});h+="</div>"}else{h+="<p>暂无链接</p>"}
h+="</div>";e.innerHTML=h}catch(ex){e.innerHTML="<p>"+ex.message+"</p>"}}
function addFriendLink(){var n=document.getElementById("fl-name").value.trim();var u=document.getElementById("fl-url").value.trim();var d=document.getElementById("fl-desc").value.trim();var a=document.getElementById("fl-avatar").value.trim();if(!n||!u){showMsg("请输入名称和URL","err");return}
friendLinks.push({name:n,url:u,desc:d,avatar:a});saveFriendLinks();showMsg("已添加","ok");renderFriendLinks()}
function editFriendLink(i){var l=friendLinks[i];var n=prompt("名称",l.name);if(!n)return;var u=prompt("URL?",l.url);if(!u)return;var d=prompt("描述",l.desc||"");var a=prompt("头像URL",l.avatar||"");friendLinks[i]={name:n,url:u,desc:d,avatar:a};saveFriendLinks();showMsg("已添加","ok");renderFriendLinks()}
function deleteFriendLink(i){if(!confirm("确定删除 "+friendLinks[i].name+"?"))return;friendLinks.splice(i,1);saveFriendLinks();showMsg("已添加","ok");renderFriendLinks()}
async function saveFriendLinks(){try{var r=await ghPut("src/data/friendlinks.json",friendLinks,friendLinksSha);friendLinksSha=r.content.sha}catch(e){showMsg(e.message,"err")}}

// CUSTOM PAGES
let customPages=[],customPagesSha=null
async function renderCustomPages(){var e=document.getElementById("tab-custompages");if(!e){setTimeout(function(){renderCustomPages()},100);return}
try{var r=await fetch("https://api.github.com/repos/"+REPO+"/contents/src/data/custompages.json?ref="+BRANCH,{headers:{"Authorization":"Bearer "+TOKEN,"Accept":"application/vnd.github.v3+json"}})
var d=[];if(r.ok){var j=await r.json();d=JSON.parse(b64Decode(j.content));customPagesSha=j.sha}else{customPagesSha=null}
customPages=d;var h="<div class=\"card\"><h3>📄 自定义页面</h3><p>管理自定义页面</p>"
h+="<div class=\"card\" style=\"padding:16px;background:rgba(199,62,58,0.03);border:1px dashed rgba(199,62,58,0.2)\"><h4>添加新链接</h4>"
h+="<div class=\"grid-2 mb-2\"><div><label>名称</label><input id=\"cp-title\" placeholder=\"名称\"></div><div><label>URL??</label><input id=\"cp-slug\" placeholder=\"slug\" style=\"font-family:monospace\"></div></div>"
h+="<div class=\"mb-2\"><label>内容 (Markdown)</label><textarea id=\"cp-body\" rows=\"6\" placeholder=\"??\"></textarea></div>"
h+="<button onclick=\"addCustomPage()\" class=\"btn btn-ok btn-sm\">创建页面</button></div>"
if(d.length>0){h+="<div style=\"display:grid;gap:8px\">";d.forEach(function(p,i){h+="<div class=\"card\" style=\"padding:12px 16px;display:flex;justify-content:space-between;align-items:center\"><div><div>"+esc(p.title)+"</div><div class=\"text-xs text-muted\">/pages/"+esc(p.slug)+"</div></div><div class=\"flex gap-2\"><button onclick=\"editCustomPage("+i+")\" class=\"btn btn-outline btn-xs\">??</button><button onclick=\"deleteCustomPage("+i+")\" class=\"btn btn-primary btn-xs\">删除</button></div></div>"});h+="</div>"}
h+="</div>";e.innerHTML=h}catch(ex){e.innerHTML="<p>"+ex.message+"</p>"}}
function addCustomPage(){var t=document.getElementById("cp-title").value.trim();var s=document.getElementById("cp-slug").value.trim();var b=document.getElementById("cp-body").value.trim();if(!t||!s){showMsg("请输入标题和URL","err");return}
customPages.push({title:t,slug:s,body:b,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});saveCustomPages();showMsg("已添加","ok");renderCustomPages()}
function editCustomPage(i){var p=customPages[i];var t=prompt("标题",p.title);if(!t)return;var s=prompt("URL",p.slug);if(!s)return;var b=prompt("内容",p.body||"");if(b===null)return;customPages[i]={title:t,slug:s,body:b,createdAt:p.createdAt,updatedAt:new Date().toISOString()};saveCustomPages();showMsg("已更新","ok");renderCustomPages()}
function deleteCustomPage(i){if(!confirm("确定删除 "+customPages[i].title+"?"))return;customPages.splice(i,1);saveCustomPages();showMsg("已删除","ok");renderCustomPages()}
async function saveCustomPages(){try{var r=await ghPut("src/data/custompages.json",customPages,customPagesSha);customPagesSha=r.content.sha}catch(e){showMsg(e.message,"err")}}

// MEDIA LIBRARY
async function renderMediaLib(){var e=document.getElementById("tab-medialib");if(!e){setTimeout(function(){renderMediaLib()},100);return}
try{var r=await fetch("https://api.github.com/repos/"+REPO+"/contents/public/uploads?ref="+BRANCH,{headers:{"Authorization":"Bearer "+TOKEN,"Accept":"application/vnd.github.v3+json"}})
if(!r.ok){e.innerHTML="<div class=\"card\"><h3>🖼️ 媒体库</h3><p>加载失败</p></div>";return}
var fs=await r.json();var imgs=fs.filter(function(f){return f.name.match(/\.(jpg|jpeg|png|gif|svg|webp|ico)$/i)});var oth=fs.filter(function(f){return !f.name.match(/\.(jpg|jpeg|png|gif|svg|webp|ico)$/i)})
var h="<div class=\"card\"><h3>🖼️ 媒体库</h3><p>共 "+fs.length+" 个标签</p>"
if(imgs.length>0){h+="<h4>图片 ("+imgs.length+")</h4><div class=\"file-grid\">"
imgs.forEach(function(f){var url="https://raw.githubusercontent.com/"+REPO+"/"+BRANCH+"/public/uploads/"+f.name;h+="<div class=\"file-item\"><img src=\""+url+"\" alt=\""+esc(f.name)+"\" loading=\"lazy\" onerror=\"this.style.display='none'\"><div class=\"file-name\">"+esc(f.name)+"</div><div class=\"flex gap-1 mt-1 justify-center\"><button onclick=\"copyMediaUrl('"+esc(f.name)+"')\" class=\"btn btn-outline btn-xs\" style=\"padding:2px 6px;font-size:10px\">??</button><button onclick=\"deleteMediaFile('"+esc(f.name)+"')\" class=\"btn btn-primary btn-xs\" style=\"padding:2px 6px;font-size:10px\">??</button></div></div>"})
h+="</div>"}
if(oth.length>0){h+="<h4>图片 ("+oth.length+")</h4>";oth.forEach(function(f){h+="<div style=\"display:flex;justify-content:space-between;padding:6px 12px;background:#f7f3e8;border:1px solid #e8e0cc;border-radius:4px;font-size:12px\"><span>"+esc(f.name)+"</span><button onclick=\"deleteMediaFile('"+esc(f.name)+"')\" class=\"btn btn-primary btn-xs\" style=\"padding:2px 6px;font-size:10px\">??</button></div>"})}
h+="</div>";e.innerHTML=h}catch(ex){e.innerHTML="<p>"+ex.message+"</p>"}}
function copyMediaUrl(n){var u="/uploads/"+n;try{navigator.clipboard.writeText(u)}catch(e){}showMsg("已复制: "+u","ok")}
async function deleteMediaFile(n){if(!confirm("确定删除 "+n+"?"))return;try{var r=await fetch("https://api.github.com/repos/"+REPO+"/contents/public/uploads/"+n+"?ref="+BRANCH,{headers:{"Authorization":"Bearer "+TOKEN,"Accept":"application/vnd.github.v3+json"}});if(!r.ok)throw Error("文件不存在");var d=await r.json();var del=await fetch("https://api.github.com/repos/"+REPO+"/contents/public/uploads/"+n,{method:"DELETE",headers:{"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"},body:JSON.stringify({message:"删除文件: "+n,sha:d.sha,branch:BRANCH})});if(!del.ok)throw Error("删除失败");showMsg("已删除 "+n,"ok");renderMediaLib()}catch(ex){showMsg(ex.message,"err")}}
// ANALYTICS
async function renderAnalytics(){var e=document.getElementById("tab-analytics");if(!e){setTimeout(function(){renderAnalytics()},100);return}
try{var r=await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts?ref="+BRANCH,{headers:{"Authorization":"Bearer "+TOKEN,"Accept":"application/vnd.github.v3+json"}});if(!r.ok){e.innerHTML="<p>加载失败</p>";return}
var fs=await r.json();var posts=fs.filter(function(f){return f.name.endsWith(".mdx")||f.name.endsWith(".md")});var total=posts.length;var chars=0;var draft=0;var tags={};var cats={};var months={};var years={}
posts.forEach(function(f){try{var ct=b64Decode(f.content);chars+=ct.length;var p=ct.split("---");if(p.length<3)return;var fm=p[1];if(fm.indexOf("draft: true")>=0)draft++;var dm=fm.match(/date:\s*["']([^"']+)["']/);if(dm){var d=dm[1].substring(0,7);months[d]=(months[d]||0)+1;years[dm[1].substring(0,4)]=(years[dm[1].substring(0,4)]||0)+1}
var tm=fm.match(/tags:\s*\[([^\]]+)\]/);if(tm){tm[1].split(",").forEach(function(t){var tag=t.trim().replace(/["']/g,"");if(tag)tags[tag]=(tags[tag]||0)+1})}
var cm=fm.match(/category:\s*["']([^"']+)["']/);if(cm)cats[cm[1]]=(cats[cm[1]]||0)+1}catch(ex){}})
var h="<div class=\"card\"><h3>📈 统计分析</h3><div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px\">"
h+="<div class=\"card\" style=\"padding:16px;text-align:center\"><div style=\"font-size:10px;color:#6b5f45\">??</div><div style=\"font-size:24px;font-weight:700;color:#c73e3a\">"+total+"</div></div>"
h+="<div class=\"card\" style=\"padding:16px;text-align:center\"><div style=\"font-size:10px;color:#6b5f45\">??</div><div style=\"font-size:24px;font-weight:700;color:#4a6741\">"+draft+"</div></div>"
h+="<div class=\"card\" style=\"padding:16px;text-align:center\"><div style=\"font-size:10px;color:#6b5f45\">??</div><div style=\"font-size:24px;font-weight:700;color:#6b5f45\">"+chars.toLocaleString()+"</div></div>"
h+="<div class=\"card\" style=\"padding:16px;text-align:center\"><div style=\"font-size:10px;color:#6b5f45\">??</div><div style=\"font-size:24px;font-weight:700;color:#8b6914\">"+Object.keys(tags).length+"</div></div>"
h+="<div class=\"card\" style=\"padding:16px;text-align:center\"><div style=\"font-size:10px;color:#6b5f45\">??</div><div style=\"font-size:24px;font-weight:700;color:#4a6741\">"+Object.keys(cats).length+"</div></div>"
h+="</div></div>"
var sm=Object.keys(months).sort();if(sm.length>0){h+="<div class=\"card\"><h3>发布趋势</h3><div style=\"display:flex;gap:4px;align-items:end;min-height:100px;padding:10px 0\">";var mx=Math.max.apply(null,sm.map(function(m){return months[m]}))
sm.forEach(function(m){var cnt=months[m];var ht=Math.max(20,Math.round(cnt/mx*100));h+="<div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px\"><span style=\"font-size:10px;color:#6b5f45\">"+cnt+"</span><div style=\"width:100%;height:"+ht+"px;background:#c73e3a;border-radius:3px 3px 0 0;min-height:4px\"></div><span style=\"font-size:9px;color:#6b5f45;transform:rotate(-45deg);white-space:nowrap\">"+m+"</span></div>"});h+="</div></div>"}
e.innerHTML=h}catch(ex){e.innerHTML="<p>"+ex.message+"</p>"}}

// THEMES
async function renderThemes(){var e=document.getElementById("tab-themes");if(!e){setTimeout(function(){renderThemes()},100);return}
var themes=[{name:"朱砂",accent:"#c73e3a",bg:"#f7f3e8",text:"#1c1c1c",desc:"经典中国红"},{name:"青竹",accent:"#2d5a27",bg:"#f4f1ea",text:"#1a1a1a",desc:"自然清新"},{name:"秋杏",accent:"#8b6914",bg:"#faf6ed",text:"#2c2c1c",desc:"温润秋色"},{name:"远山",accent:"#4a6fa5",bg:"#f8f6f2",text:"#1c1c2c",desc:"沉静蓝调"},{name:"棠粉",accent:"#8b3a62",bg:"#f7f0f3",text:"#2c1c24",desc:"淡雅粉韵"},{name:"墨青",accent:"#3d5a5c",bg:"#f0efe8",text:"#1c2424",desc:"水墨意境"}]
var h="<div class=\"card\"><h3>💾 数据备份</h3><p>导出博客数据</p><div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px\">"
themes.forEach(function(t){h+="<div class=\"card\" style=\"padding:16px;cursor:pointer;text-align:center;border:2px solid transparent\" onclick=\"applyThemePreset('"+t.accent+"','"+t.bg+"','"+t.text+"')\" onmouseover=\"this.style.borderColor='"+t.accent+"'\" onmouseout=\"this.style.borderColor='transparent'\"><div style=\"width:40px;height:40px;border-radius:50%;background:"+t.accent+";margin:0 auto 8px;border:3px solid "+t.bg+";box-shadow:0 0 0 2px "+t.accent+"\"></div><div style=\"font-size:13px;font-weight:500;color:"+t.text+"\">"+t.name+"</div><div style=\"font-size:11px;color:#6b5f45\">"+t.desc+"</div></div>"})
h+="</div></div><div class=\"card\"><button onclick=\"switchTab('site')\" class=\"btn btn-outline btn-sm\">自定义配色</button></div>";e.innerHTML=h}
function applyThemePreset(a,b,t){if(!confirm("应用此主题？"))return;document.body.style.background=b;var el=document.getElementById("tab-site");if(!el){switchTab("site");return};document.getElementById("site-accent").value=a;document.getElementById("site-bg").value=b;document.getElementById("site-text").value=t;showMsg("主题已应用","ok");switchTab("site")}

// BACKUP
async function renderBackup(){var e=document.getElementById("tab-backup");if(!e){setTimeout(function(){renderBackup()},100);return}
var h="<div class=\"card\"><h3>💾 数据备份</h3><p>导出博客数据</p><div style=\"display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))\">"
h+="<div class=\"card\" style=\"padding:16px;text-align:center\"><div style=\"font-size:28px\">📄</div><h4>导出文章</h4><p class=\"text-xs text-muted mb-3\">JSON格式</p><button onclick=\"exportPosts()\" class=\"btn btn-ok btn-sm\">导出</button></div>"
h+="<div class=\"card\" style=\"padding:16px;text-align:center\"><div style=\"font-size:28px\">⚙️</div><h4>导出配置</h4><p class=\"text-xs text-muted mb-3\">JSON格式</p><button onclick=\"exportConfig()\" class=\"btn btn-ok btn-sm\">导出</button></div>"
h+="<div class=\"card\" style=\"padding:16px;text-align:center\"><div style=\"font-size:28px\">📦</div><h4>全部导出</h4><p class=\"text-xs text-muted mb-3\">文章+配置</p><button onclick=\"exportAll()\" class=\"btn btn-primary btn-sm\">全部导出</button></div>"
h+="</div></div>";e.innerHTML=h}
async function exportPosts(){try{var r=await fetch("https://api.github.com/repos/"+REPO+"/contents/src/content/posts?ref="+BRANCH,{headers:{"Authorization":"Bearer "+TOKEN,"Accept":"application/vnd.github.v3+json"}});if(!r.ok)throw Error("获取失败");var fs=await r.json();var posts=[]
for(var i=0;i<fs.length;i++){var f=fs[i];if(!f.name.endsWith(".mdx")&&!f.name.endsWith(".md"))continue;posts.push({filename:f.name,content:b64Decode(f.content)})}
var blob=new Blob([JSON.stringify(posts,null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="posts-backup-"+new Date().toISOString().split("T")[0]+".json";a.click();URL.revokeObjectURL(url);showMsg("已导出 ts.length+" ?" 篇","ok"))}catch(ex){showMsg(ex.message,"err")}}
async function exportConfig(){try{var configs={};var cfgs=["src/data/tools.json","src/data/navigation.json","src/data/profile.json","src/data/site.json","src/data/social.json","src/data/about.json"]
for(var i=0;i<cfgs.length;i++){try{var r=await fetch("https://api.github.com/repos/"+REPO+"/contents/"+cfgs[i]+"?ref="+BRANCH,{headers:{"Authorization":"Bearer "+TOKEN,"Accept":"application/vnd.github.v3+json"}});if(r.ok){var d=await r.json();configs[cfgs[i]]=JSON.parse(b64Decode(d.content))}}catch(ex){}}
var blob=new Blob([JSON.stringify(configs,null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="config-backup-"+new Date().toISOString().split("T")[0]+".json";a.click();URL.revokeObjectURL(url);showMsg("配置已导出"","ok")}catch(ex){showMsg(ex.message,"err")}}
async function exportAll(){try{await exportPosts();await exportConfig();showMsg("配置已导出"","ok")}catch(ex){showMsg(ex.message,"err")}}

</script>
